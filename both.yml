---
- name: Analysis and upgrade
  hosts: all
  strategy: free
  gather_facts: true
  become: true
  force_handlers: true
  vars:
    leapp_answerfile: |
      [remove_pam_pkcs11_module_check]
      confirm = True
    update_grub_to_grub_2: true
  pre_tasks:
    - name: Fix subscription-manager
      ansible.builtin.command:
        cmd: subscription-manager unregister
      changed_when: true
      failed_when: false
      when: false

  roles:
    - infra.leapp.analysis
    - flush_handlers
    - infra.leapp.upgrade

...
